services:
  - type: web
    name: star-club
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false        # Set in Render dashboard
      - key: TURSO_AUTH_TOKEN
        sync: false        # Set in Render dashboard
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false        # Set to your app URL after first deploy
      - key: NODE_ENV
        value: production
