services:
  - type: web
    name: star-club
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma db push --skip-generate --accept-data-loss && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false        # Set in Render dashboard → Neon pooled connection string
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false        # Set to your app URL after first deploy
      - key: NODE_ENV
        value: production
